# Production docker-compose for the single-VM GCE deploy.
#
# Topology (all in one VM):
#   internet → Caddy (80/443, auto Let's Encrypt) → web:3000 / ws-server:4000
#   web / ws-server → db (Cloud SQL Auth Proxy) → Cloud SQL Postgres
#
# Image pulls go through Artifact Registry with the VM's service account
# (`gcloud auth configure-docker us-central1-docker.pkg.dev` runs in startup.sh).
# Secrets are mounted via .env which startup.sh hydrates from Secret Manager.

services:
  db:
    # Cloud SQL Auth Proxy v2 — talks to Cloud SQL via the VM's attached
    # service account (metadata server credentials), exposes a plain
    # TCP socket inside the compose network so the apps connect via
    # postgresql://hunch:<pw>@db:5432/hunchit.
    image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.16.0
    restart: always
    command:
      - "--address=0.0.0.0"
      - "--port=5432"
      - "${GCP_SQL_CONNECTION_NAME}"
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 5432 || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5

  ws-server:
    image: ${REGISTRY}/ws-server:latest
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - PRIVY_APP_ID=${PRIVY_APP_ID}
      - PRIVY_APP_SECRET=${PRIVY_APP_SECRET}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - LLM_ENABLED=${LLM_ENABLED}
      - LLM_DAILY_USD_CAP=${LLM_DAILY_USD_CAP}
      - SIGNAL_INTERVAL_SECONDS=${SIGNAL_INTERVAL_SECONDS}
      - TICKER_STAGGER_SECONDS=${TICKER_STAGGER_SECONDS}
      - BYPASS_MARKET_HOURS=${BYPASS_MARKET_HOURS}
      - PYTH_HERMES_URL=${PYTH_HERMES_URL}
      - PYTH_BENCHMARKS_URL=${PYTH_BENCHMARKS_URL}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
      - NEXT_PUBLIC_SOLANA_RPC_URLS=${NEXT_PUBLIC_SOLANA_RPC_URLS}
      - NEXT_PUBLIC_JUPITER_API_BASE=${NEXT_PUBLIC_JUPITER_API_BASE}
      - WS_SERVER_PORT=4000
      - WS_CRON_SECRET=${WS_CRON_SECRET}
      - DEMO_MODE=false
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/healthz | grep -q ok || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  web:
    image: ${REGISTRY}/web:latest
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - PRIVY_APP_ID=${PRIVY_APP_ID}
      - PRIVY_APP_SECRET=${PRIVY_APP_SECRET}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      # NEXT_PUBLIC_* are baked into the bundle at build time, but we
      # also expose them at runtime so server-side handlers (route.ts,
      # middleware) read the same value as the client bundle.
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
      - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL}
      - NEXT_PUBLIC_PRIVY_APP_ID=${NEXT_PUBLIC_PRIVY_APP_ID}
      - NEXT_PUBLIC_SOLANA_RPC_URLS=${NEXT_PUBLIC_SOLANA_RPC_URLS}
      - NEXT_PUBLIC_DEFAULT_TRADE_USD=${NEXT_PUBLIC_DEFAULT_TRADE_USD}
      - NEXT_PUBLIC_DEMO_MODE=false
      - NEXT_PUBLIC_JUPITER_API_BASE=${NEXT_PUBLIC_JUPITER_API_BASE}
      - DEMO_MODE=false
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ -O /dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  caddy:
    image: caddy:2.10-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - DOMAIN_WEB=${DOMAIN_WEB}
      - DOMAIN_WS=${DOMAIN_WS}
      - LETSENCRYPT_EMAIL=${LETSENCRYPT_EMAIL}
    depends_on:
      web:
        condition: service_healthy
      ws-server:
        condition: service_healthy

volumes:
  caddy_data:
  caddy_config:
